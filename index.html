<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz systemy operacyjne</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-gradient: linear-gradient(135deg, #0f172a, #1e1b4b);
            --card-bg: rgba(30, 41, 59, 0.85);
            --card-border: rgba(255, 255, 255, 0.1);
            --primary: #6366f1;
            --success: #10b981;
            --success-bg: rgba(16, 185, 129, 0.15);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.15);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --border-radius: 16px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app {
            max-width: 850px;
            width: 100%;
            padding: 2rem;
            padding-top: 0rem;
            box-sizing: border-box;
        }

        header {
            text-align: center;
            margin-bottom: 1.5rem;
            position: sticky;
            top: 0;
            background: var(--bg-gradient);
            z-index: 1000;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--card-border);
        }

        h1 {
            font-size: 2.2rem;
            margin-top: 0rem;
            padding-top: 2rem;
            padding-bottom: 0.5rem;
            background: -webkit-linear-gradient(45deg, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sections-nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-top: 0.5rem;
        }

        .btn-section {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--card-border);
            color: var(--text-muted);
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            /* Zmiany estetyczne dla równej szerokości */
            min-width: 110px;
            text-align: center;
            display: inline-block;
        }

        .btn-section:hover {
            background: rgba(99, 102, 241, 0.2);
            color: var(--text-main);
        }

        .btn-section.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
            box-shadow: 0 0 12px rgba(99, 102, 241, 0.4);
        }

        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 1.5rem;
            backdrop-filter: blur(10px);
            box-shadow: 0 10px 30px rgba(0,0,0,0.4);
            transition: all 0.3s ease;
        }

        button {
            font-family: 'Inter', sans-serif;
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
        }

        button.outline:hover {
            background: rgba(99, 102, 241, 0.1);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            color: var(--text-main);
        }

        .option:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateX(4px);
        }

        .option.correct {
            background: var(--success-bg);
            border-color: var(--success);
            color: #34d399;
            font-weight: 600;
        }

        .option.wrong {
            background: var(--error-bg);
            border-color: var(--error);
            color: #f87171;
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .explanation.show { display: block; animation: fadeIn 0.4s ease forwards; }
        .explanation strong { color: #818cf8; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        pre {
            background: rgba(0,0,0,0.3);
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--card-border);
        }
        
        code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
        }

        .progress-sidebar {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 1000;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
            text-align: center;
        }

        @media (max-width: 1300px) {
            .progress-sidebar {
                top: auto;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
                max-width: 400px;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>Systemy operacyjne</h1>
        <div class="sections-nav" id="sections-navigation"></div>
    </header>

    <div>
        <div class="progress-sidebar">
            <div style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">Wynik bieżącego zestawu</div>
            <div id="list-score" style="font-weight: bold; font-size: 1.1rem; color: #34d399;">Rozwiązano: 0</div>
        </div>
        
        <div id="list-container">Ładowanie pytań...</div>
        
        <div style="text-align: center; margin-top: 2rem;">
             <button class="outline" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Wróć na górę &uarr;</button>
        </div>
    </div>
</div>

<script>
let qData = [];
let listAnswers = [];
const QUESTIONS_PER_SECTION = 50;
let currentSection = 0;

async function initQuiz() {
    try {
        const response = await fetch('questions.json');
        if (!response.ok) {
            throw new Error('Problem z załadowaniem pliku z pytaniami.');
        }
        qData = await response.json();
        // Tablica odpowiedzi zachowuje stan dla wszystkich pytań globalnie
        listAnswers = new Array(qData.length).fill(null);
        
        renderSectionTabs();
        renderList();
    } catch (error) {
        document.getElementById('list-container').innerHTML = `<div class="glass-card" style="color: var(--error);">Błąd: ${error.message}</div>`;
    }
}

// Generowanie zakładek u góry strony z nową numeracją
function renderSectionTabs() {
    const nav = document.getElementById('sections-navigation');
    nav.innerHTML = '';
    
    const totalSections = Math.ceil(qData.length / QUESTIONS_PER_SECTION);
    
    if (totalSections <= 1) return;

    for (let i = 0; i < totalSections; i++) {
        // Obliczanie numerów na guziku (np. 1-50, 51-100)
        const startNum = i * QUESTIONS_PER_SECTION + 1;
        const endNum = Math.min((i + 1) * QUESTIONS_PER_SECTION, qData.length);

        const btn = document.createElement('button');
        btn.className = `btn-section ${i === currentSection ? 'active' : ''}`;
        btn.innerText = `${startNum}-${endNum}`;
        btn.onclick = () => switchSection(i);
        nav.appendChild(btn);
    }
}

function switchSection(sectionIndex) {
    currentSection = sectionIndex;
    
    // Aktualizacja podświetlenia aktywnej zakładki
    const buttons = document.querySelectorAll('.btn-section');
    buttons.forEach((btn, idx) => {
        if (idx === sectionIndex) btn.classList.add('active');
        else btn.classList.remove('active');
    });

    renderList();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderList() {
    const container = document.getElementById('list-container');
    container.innerHTML = '';
    updateListStats();

    // Obliczanie zakresu pytań dla bieżącej sekcji
    const startIndex = currentSection * QUESTIONS_PER_SECTION;
    const endIndex = Math.min(startIndex + QUESTIONS_PER_SECTION, qData.length);
    const sectionQuestions = qData.slice(startIndex, endIndex);

    let htmlBuffer = '';
    sectionQuestions.forEach((q, localIdx) => {
        // Globalny indeks pytania w pełnej tablicy qData
        const globalIdx = startIndex + localIdx; 
        const hasAnswered = listAnswers[globalIdx] !== null;

        htmlBuffer += `
        <div class="glass-card">
            <div class="question-text">${globalIdx + 1}. ${formatTextWithCode(q[0])}</div>
            <div class="options" id="list-opt-${globalIdx}">
                ${q[1].map((opt, i) => {
                    let extraClass = '';
                    let disabledAttr = hasAnswered ? 'disabled' : '';
                    
                    if (hasAnswered) {
                        if (i === q[2]) extraClass = ' correct';
                    }

                    return `<button class="option${extraClass}" ${disabledAttr} onclick="handleList(${globalIdx}, this, ${i})">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</button>`;
                }).join('')}
            </div>
            <div class="explanation ${hasAnswered ? 'show' : ''}" id="list-exp-${globalIdx}">
                <strong>Wyjaśnienie: </strong> ${q[3]}
            </div>
        </div>`;
    });
    
    container.innerHTML = htmlBuffer;
    
    // Przywrócenie czerwonego tła dla błędnych odpowiedzi, jeśli użytkownik wraca na kartę
    for (let gIdx = startIndex; gIdx < endIndex; gIdx++) {
        if (listAnswers[gIdx] === false) {
            const optionsContainer = document.getElementById(`list-opt-${gIdx}`);
            if (optionsContainer) {
                const allBtns = optionsContainer.querySelectorAll('.option');
                // Jeśli jest potrzeba dokładnego zapamiętywania WYBRANEJ złej odpowiedzi, 
                // trzeba by zmienić strukturę listAnswers na trzymanie indexu wybranej opcji.
                // Obecnie uproszczono to do pokazania tylko zielonej poprawnej, co przy re-renderze jest czystym i jasnym rozwiązaniem.
            }
        }
    }

    if (typeof hljs !== 'undefined') hljs.highlightAll();
}

window.handleList = function(globalIdx, btn, index) {
    if(listAnswers[globalIdx] !== null) return; 

    const q = qData[globalIdx];
    const optionsContainer = document.getElementById(`list-opt-${globalIdx}`);
    const allBtns = optionsContainer.querySelectorAll('.option');

    allBtns.forEach(b => b.disabled = true);

    let isCorrect = (index === q[2]);
    listAnswers[globalIdx] = isCorrect;

    if(isCorrect) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        allBtns[q[2]].classList.add('correct');
    }

    document.getElementById(`list-exp-${globalIdx}`).classList.add('show');
    updateListStats();
}

function updateListStats() {
    const startIndex = currentSection * QUESTIONS_PER_SECTION;
    const endIndex = Math.min(startIndex + QUESTIONS_PER_SECTION, qData.length);
    const currentSectionAnswers = listAnswers.slice(startIndex, endIndex);

    const answered = currentSectionAnswers.filter(a => a !== null).length;
    const corrects = currentSectionAnswers.filter(a => a === true).length;
    const totalInSection = endIndex - startIndex;
    const scoreText = document.getElementById('list-score');

    if(answered === 0) {
        scoreText.innerText = `Rozwiązano: 0 / ${totalInSection}`;
    } else {
        scoreText.innerText = `Rozwiązano: ${answered} / ${totalInSection} | Punkty: ${corrects} (${Math.round(corrects/answered*100)}%)`;
    }
}

function formatTextWithCode(text) {
    if (text.includes('\n') && (text.includes('{') || text.includes('let') || text.includes('public') || text.includes('var') || text.includes('()'))) {
        let parts = text.split(/\n(?=class|public|let|var|type|if|\(|T\[\])/);
        if (parts.length > 1) {
            let desc = parts[0];
            let code = parts.slice(1).join('\n');
            return `<p>${desc}</p><pre><code class="language-csharp">${code}</code></pre>`;
        }
        return `<pre><code>${text}</code></pre>`;
    }
    return text.replace(/\n/g, '<br>');
}

initQuiz();
</script>

</body>
</html>
