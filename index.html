<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz systemy operacyjne</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/atom-one-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        :root {
            --bg-color: #0d0d0d;        
            --card-bg: #1a1a1a;          
            --border-color: #2e2e2e;     
            --text-main: #f5f5f5;        
            --text-muted: #b3b3b3;       
            --primary: #c2c2c2;           
            
            --success: #4ade80;           
            --error: #f87171;             

            --success-bg: rgba(74, 222, 128, 0.15);
            --error-bg: rgba(248, 113, 113, 0.15);

            --border-radius: 12px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background-color: #0c0c0c;
            background-attachment: fixed;
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
        }

        #app {
            max-width: 850px;
            width: 100%;
            padding: 2rem;
            padding-top: 0rem;
            box-sizing: border-box;
        }

        /* --- NAPRAWIONY NAGŁÓWEK STICKY --- */
        header {
            text-align: center;
            margin-bottom: 1.5rem;
            position: sticky;
            top: 0;
            background-color: #0c0c0c; /* Stałe tło zapobiegające prześwitywaniu */
            z-index: 1000;
            padding-bottom: 1rem;
            border-bottom: 1px solid var(--border-color); 
        }

        h1 {
            font-size: 2.2rem;
            margin-top: 0rem;
            padding-top: 2rem;
            padding-bottom: 0.5rem;
            color: #e2e8f0;
        }

        .dataset-toggle {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
        }

        .dataset-btn {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            min-width: 180px;
            padding: 0.6rem 1.5rem;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .dataset-btn:hover {
            background: var(--primary);
            color: #000;
        }

        .dataset-btn.active {
            background: var(--primary);
            color: #000; /* Zmiana tekstu na czarny dla lepszego kontrastu */
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        /* --- NAWIGACJA SEKCJI (DESKTOP I MOBILE) --- */
        .sections-nav {
            padding-left: 10px;
            padding-right: 10px;
        }

        .desktop-nav {
            display: flex;
            justify-content: center;
            gap: 0.5rem;
            flex-wrap: wrap;
        }

        .mobile-nav-container {
            display: none;
            width: 100%;
            text-align: center;
        }

        .mobile-nav-select {
            width: 100%;
            max-width: 300px;
            padding: 0.75rem 1rem;
            background: rgba(255, 255, 255, 0.08);
            color: var(--text-main);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            appearance: none; /* Ukrywa domyślną strzałkę systemową na niektórych przeglądarkach */
            background-image: url("data:image/svg+xml;charset=US-ASCII,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20width%3D%22292.4%22%20height%3D%22292.4%22%3E%3Cpath%20fill%3D%22%23c2c2c2%22%20d%3D%22M287%2069.4a17.6%2017.6%200%200%200-13-5.4H18.4c-5%200-9.3%201.8-12.9%205.4A17.6%2017.6%200%200%200%200%2082.2c0%205%201.8%209.3%205.4%2012.9l128%20127.9c3.6%203.6%207.8%205.4%2012.8%205.4s9.2-1.8%2012.8-5.4L287%2095c3.5-3.5%205.4-7.8%205.4-12.8%200-5-1.9-9.2-5.5-12.8z%22%2F%3E%3C%2Fsvg%3E");
            background-repeat: no-repeat;
            background-position: right 1rem top 50%;
            background-size: 0.65rem auto;
        }

        .mobile-nav-select:focus {
            outline: none;
            border-color: var(--primary);
        }

        .mobile-nav-select option {
            background-color: var(--bg-color);
            color: var(--text-main);
        }

        .btn-section {
            background: rgba(255, 255, 255, 0.08);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 0.5rem 1rem;
            font-size: 0.9rem;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            min-width: 110px;
            text-align: center;
            display: inline-block;
        }

        .btn-section:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .btn-section.active {
            background: var(--primary);
            color: #000;
            border-color: var(--primary);
        }

        @media (max-width: 768px) {
            .desktop-nav { display: none; }
            .mobile-nav-container { display: block; }
        }

        /* --- RESZTA STYLÓW --- */
        .glass-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: var(--border-radius);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        button.outline {
            font-family: 'Inter', sans-serif;
            background: transparent;
            border: 1px solid var(--primary);
            color: var(--primary);
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        button.outline:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        .question-text {
            font-size: 1.15rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 0.75rem;
        }

        .option {
            font-family: 'Inter', sans-serif;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.12);
            padding: 1rem;
            border-radius: 8px;
            cursor: pointer;
            text-align: left;
            color: var(--text-main);
            transition: all 0.2s ease;
        }

        .option:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.12);
            border-color: rgba(255, 255, 255, 0.25);
            transform: translateX(4px);
        }

        .option.correct {
            background: var(--success-bg);
            border-color: var(--success);
            color: var(--success);
            font-weight: 600;
        }

        .option.wrong {
            background: var(--error-bg);
            border-color: var(--error);
            color: var(--error);
        }

        .explanation {
            margin-top: 1.5rem;
            padding: 1.25rem;
            background: rgba(0, 0, 0, 0.4);
            border-radius: 8px;
            border-left: 4px solid var(--primary);
            display: none;
            font-size: 0.95rem;
            line-height: 1.6;
        }

        .explanation.show { display: block; animation: fadeIn 0.4s ease forwards; }
        .explanation strong { color: var(--primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        pre {
            background: #000;
            padding: 1rem;
            border-radius: 8px;
            overflow-x: auto;
            border: 1px solid var(--border-color);
        }
        
        code {
            font-family: 'Consolas', 'Monaco', monospace;
            font-size: 0.9rem;
        }

        .progress-sidebar {
            position: fixed;
            top: 50%;
            left: 20px;
            transform: translateY(-50%);
            z-index: 1000;
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: var(--border-radius);
            border: 1px solid var(--border-color);
            text-align: center;
        }

        @media (max-width: 1300px) {
            .progress-sidebar {
                top: auto;
                bottom: 20px;
                left: 50%;
                transform: translateX(-50%);
                width: 90%;
                max-width: 400px;
                padding: 1rem;
            }
        }
    </style>
</head>
<body>

<div id="app">
    <header>
        <h1>Systemy operacyjne</h1>
        
        <div class="dataset-toggle">
            <button id="btn-main" class="dataset-btn" onclick="loadDataset('questions.json', 'main')">CAŁA LISTA</button>
            <button id="btn-newest" class="dataset-btn" onclick="loadDataset('questions_najnowsze.json', 'newest')">NAJNOWSZE</button>
            <button id="btn-random" class="dataset-btn" onclick="startRandomMode('random')">LOSOWE</button>
        </div>

        <div class="sections-nav" id="sections-navigation"></div>
    </header>

    <div>
        <div class="progress-sidebar">
            <div id="list-score-title" style="font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 0.5rem;">Wynik bieżącego zestawu</div>
            <div id="list-score" style="font-weight: bold; font-size: 1.1rem; color: var(--success);">Rozwiązano: 0</div>
        </div>
        
        <div id="list-container">Ładowanie pytań...</div>
        
        <div style="text-align: center; margin-top: 2rem;">
             <button class="outline" onclick="window.scrollTo({top: 0, behavior: 'smooth'})">Wróć na górę &uarr;</button>
        </div>
    </div>
</div>

<script>
let qData = [];
let listAnswers = [];
const QUESTIONS_PER_SECTION = 50;
let currentSection = 0;

let isRandomMode = false;
let randomPool = [];
let randomStats = { answered: 0, corrects: 0 };
let currentRandomQuestion = null;

async function loadDataset(filename, btnId) {
    isRandomMode = false;
    document.getElementById('list-score-title').innerText = "Wynik bieżącego zestawu";

    try {
        document.querySelectorAll('.dataset-btn').forEach(btn => btn.classList.remove('active'));
        const activeBtn = document.getElementById(`btn-${btnId}`);
        if(activeBtn) activeBtn.classList.add('active');

        document.getElementById('list-container').innerHTML = '<div style="text-align:center; padding: 2rem;">Ładowanie pytań...</div>';
        document.getElementById('sections-navigation').innerHTML = '';
        
        const response = await fetch(filename);
        if (!response.ok) {
            throw new Error(`Nie znaleziono pliku: ${filename}. Upewnij się, że plik istnieje w folderze.`);
        }
        
        qData = await response.json();
        listAnswers = new Array(qData.length).fill(null);
        currentSection = 0;
        
        renderSectionTabs();
        renderList();
    } catch (error) {
        document.getElementById('list-container').innerHTML = `<div class="glass-card" style="color: var(--error);">Błąd: ${error.message}</div>`;
    }
}

async function startRandomMode(btnId) {
    isRandomMode = true;
    document.getElementById('list-score-title').innerText = "Tryb losowy (Wszystkie bazy)";

    document.querySelectorAll('.dataset-btn').forEach(btn => btn.classList.remove('active'));
    document.getElementById(`btn-${btnId}`).classList.add('active');

    document.getElementById('list-container').innerHTML = '<div style="text-align:center; padding: 2rem;">Losowanie...</div>';
    document.getElementById('sections-navigation').innerHTML = '';

    try {
        const [res1, res2] = await Promise.all([
            fetch('questions.json').catch(() => null),
            fetch('questions_najnowsze.json').catch(() => null)
        ]);

        let pool = [];
        if (res1 && res1.ok) pool = pool.concat(await res1.json());
        if (res2 && res2.ok) pool = pool.concat(await res2.json());

        if (pool.length === 0) {
            throw new Error('Baza pytań jest pusta lub pliki nie istnieją.');
        }

        randomPool = pool;
        randomStats = { answered: 0, corrects: 0 };
        renderRandomQuestion();

    } catch (error) {
        document.getElementById('list-container').innerHTML = `<div class="glass-card" style="color: var(--error);">Błąd: ${error.message}</div>`;
    }
}

function renderRandomQuestion() {
    if (!isRandomMode) return;
    
    const randomIndex = Math.floor(Math.random() * randomPool.length);
    currentRandomQuestion = randomPool[randomIndex];
    
    updateRandomStats();

    const container = document.getElementById('list-container');
    const q = currentRandomQuestion;
    
    let htmlBuffer = `
    <div class="glass-card">
        <div style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.9rem;">Wylosowano 1 z ${randomPool.length} dostępnych pytań</div>
        <div class="question-text">${formatTextWithCode(q[0])}</div>
        <div class="options" id="random-opt">
            ${q[1].map((opt, i) => {
                return `<button class="option" onclick="handleRandomAnswer(this, ${i})">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</button>`;
            }).join('')}
        </div>
        <div class="explanation" id="random-exp">
            <strong>Wyjaśnienie: </strong> ${q[3]}
            <div style="margin-top: 1.5rem; text-align: center;">
                <button class="outline" onclick="renderRandomQuestion()">Następne losowe pytanie &rarr;</button>
            </div>
        </div>
    </div>`;
    
    container.innerHTML = htmlBuffer;
    if (typeof hljs !== 'undefined') hljs.highlightAll();
}

window.handleRandomAnswer = function(btn, index) {
    if (!isRandomMode) return;

    const q = currentRandomQuestion;
    const optionsContainer = document.getElementById('random-opt');
    const allBtns = optionsContainer.querySelectorAll('.option');

    allBtns.forEach(b => b.disabled = true);

    let isCorrect = (index === q[2]);
    
    randomStats.answered++;
    if (isCorrect) randomStats.corrects++;

    if(isCorrect) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        allBtns[q[2]].classList.add('correct');
    }

    document.getElementById('random-exp').classList.add('show');
    updateRandomStats();
}

function updateRandomStats() {
    const scoreText = document.getElementById('list-score');
    if(randomStats.answered === 0) {
        scoreText.innerText = `Rozwiązano: 0`;
    } else {
        scoreText.innerText = `Rozwiązano: ${randomStats.answered} | Punkty: ${randomStats.corrects} (${Math.round(randomStats.corrects/randomStats.answered*100)}%)`;
    }
}

// ---------------- STANDARDOWE FUNKCJE LISTY ----------------

function renderSectionTabs() {
    if (isRandomMode) return;
    const nav = document.getElementById('sections-navigation');
    nav.innerHTML = '';
    
    const totalSections = Math.ceil(qData.length / QUESTIONS_PER_SECTION);
    
    if (totalSections <= 1) return;

    // Tworzymy wersję dla Desktopu (przyciski)
    let desktopHTML = `<div class="desktop-nav">`;
    // Tworzymy wersję dla Mobile (Select/Dropdown)
    let mobileHTML = `<div class="mobile-nav-container">
                        <select class="mobile-nav-select" onchange="switchSection(parseInt(this.value))">`;

    for (let i = 0; i < totalSections; i++) {
        const startNum = i * QUESTIONS_PER_SECTION + 1;
        const endNum = Math.min((i + 1) * QUESTIONS_PER_SECTION, qData.length);
        const label = `${startNum} - ${endNum}`;

        desktopHTML += `<button class="btn-section ${i === currentSection ? 'active' : ''}" onclick="switchSection(${i})">${label}</button>`;
        mobileHTML += `<option value="${i}" ${i === currentSection ? 'selected' : ''}>Pytania: ${label}</option>`;
    }

    desktopHTML += `</div>`;
    mobileHTML += `</select></div>`;

    nav.innerHTML = desktopHTML + mobileHTML;
}

function switchSection(sectionIndex) {
    if (isRandomMode) return;
    currentSection = sectionIndex;
    
    // Aktualizacja wizualna przycisków na PC
    const buttons = document.querySelectorAll('.btn-section');
    buttons.forEach((btn, idx) => {
        if (idx === sectionIndex) btn.classList.add('active');
        else btn.classList.remove('active');
    });

    // Aktualizacja wartości na telefonach
    const mobileSelect = document.querySelector('.mobile-nav-select');
    if (mobileSelect) {
        mobileSelect.value = sectionIndex;
    }

    renderList();
    window.scrollTo({top: 0, behavior: 'smooth'});
}

function renderList() {
    if (isRandomMode) return;
    const container = document.getElementById('list-container');
    container.innerHTML = '';
    updateListStats();

    const startIndex = currentSection * QUESTIONS_PER_SECTION;
    const endIndex = Math.min(startIndex + QUESTIONS_PER_SECTION, qData.length);
    const sectionQuestions = qData.slice(startIndex, endIndex);

    let htmlBuffer = '';
    sectionQuestions.forEach((q, localIdx) => {
        const globalIdx = startIndex + localIdx; 
        const selectedIndex = listAnswers[globalIdx];
        const hasAnswered = selectedIndex !== null;

        htmlBuffer += `
        <div class="glass-card">
            <div class="question-text">${globalIdx + 1}. ${formatTextWithCode(q[0])}</div>
            <div class="options" id="list-opt-${globalIdx}">
                ${q[1].map((opt, i) => {
                    let extraClass = '';
                    let disabledAttr = hasAnswered ? 'disabled' : '';
                    
                    if (hasAnswered) {
                        if (i === q[2]) {
                            extraClass = ' correct';
                        } else if (i === selectedIndex && selectedIndex !== q[2]) {
                            extraClass = ' wrong';
                        }
                    }

                    return `<button class="option${extraClass}" ${disabledAttr} onclick="handleList(${globalIdx}, this, ${i})">${opt.replace(/</g, '&lt;').replace(/>/g, '&gt;')}</button>`;
                }).join('')}
            </div>
            <div class="explanation ${hasAnswered ? 'show' : ''}" id="list-exp-${globalIdx}">
                <strong>Wyjaśnienie: </strong> ${q[3]}
            </div>
        </div>`;
    });
    
    container.innerHTML = htmlBuffer;
    if (typeof hljs !== 'undefined') hljs.highlightAll();
}

window.handleList = function(globalIdx, btn, index) {
    if(listAnswers[globalIdx] !== null) return; 

    const q = qData[globalIdx];
    const optionsContainer = document.getElementById(`list-opt-${globalIdx}`);
    const allBtns = optionsContainer.querySelectorAll('.option');

    allBtns.forEach(b => b.disabled = true);

    let isCorrect = (index === q[2]);
    listAnswers[globalIdx] = index;

    if(isCorrect) {
        btn.classList.add('correct');
    } else {
        btn.classList.add('wrong');
        allBtns[q[2]].classList.add('correct');
    }

    document.getElementById(`list-exp-${globalIdx}`).classList.add('show');
    updateListStats();
}

function updateListStats() {
    if (isRandomMode) return;
    const startIndex = currentSection * QUESTIONS_PER_SECTION;
    const endIndex = Math.min(startIndex + QUESTIONS_PER_SECTION, qData.length);
    const currentSectionAnswers = listAnswers.slice(startIndex, endIndex);

    const answered = currentSectionAnswers.filter(a => a !== null).length;
    
    const sectionQuestions = qData.slice(startIndex, endIndex);
    const corrects = currentSectionAnswers.filter((selectedIdx, localIdx) => {
        if (selectedIdx === null) return false;
        return selectedIdx === sectionQuestions[localIdx][2];
    }).length;

    const totalInSection = endIndex - startIndex;
    const scoreText = document.getElementById('list-score');

    if(answered === 0) {
        scoreText.innerText = `Rozwiązano: 0 / ${totalInSection}`;
    } else {
        scoreText.innerText = `Rozwiązano: ${answered} / ${totalInSection} | Punkty: ${corrects} (${Math.round(corrects/answered*100)}%)`;
    }
}

function formatTextWithCode(text) {
    if (text.includes('\n') && (text.includes('{') || text.includes('let') || text.includes('public') || text.includes('var') || text.includes('()'))) {
        let parts = text.split(/\n(?=class|public|let|var|type|if|\(|T\[\])/);
        if (parts.length > 1) {
            let desc = parts[0];
            let code = parts.slice(1).join('\n');
            return `<p>${desc}</p><pre><code class="language-csharp">${code}</code></pre>`;
        }
        return `<pre><code>${text}</code></pre>`;
    }
    return text.replace(/\n/g, '<br>');
}

window.onload = () => {
    loadDataset('questions.json', 'main');
};
</script>

</body>
</html>
